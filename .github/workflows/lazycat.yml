name: LazyCat LPK Automation

on:
  workflow_call:
    inputs:
      config:
        description: Path to .github/lazycat-action.yml.
        type: string
        required: false
        default: .github/lazycat-action.yml
      operation:
        description: auto, check, build, publish-official, or publish-private.
        type: string
        required: false
        default: auto
      runner:
        description: Linux Runner label; amd64 and arm64 hosts are supported.
        type: string
        required: false
        default: ubuntu-latest
      image-id:
        description: Optional configured image ID.
        type: string
        required: false
        default: ""
      dry-run:
        description: Calculate changes without mutating files or remote state.
        type: boolean
        required: false
        default: false
      changelog:
        description: GitHub Release changelog.
        type: string
        required: false
        default: ""
      versioned-release-asset:
        description: Copy the verified LPK to <package-id>-v<version>.lpk for GitHub Release and store publication.
        type: boolean
        required: false
        default: false
      token-file:
        description: Explicit lzc-cli-compatible token JSON file on a self-hosted runner.
        type: string
        required: false
        default: ""
      toolchains:
        description: Comma-separated subset of go,node,rust,docker without spaces.
        type: string
        required: false
        default: none
      go-version:
        description: Go version; empty reads go.mod.
        type: string
        required: false
        default: ""
      node-version:
        description: Node version; empty reads .node-version.
        type: string
        required: false
        default: ""
      rust-toolchain:
        description: Explicit Rust toolchain when rust is selected.
        type: string
        required: false
        default: ""
      node-package-manager:
        description: npm, pnpm, or yarn.
        type: string
        required: false
        default: npm
      enable-qemu:
        description: Install QEMU when docker is selected.
        type: boolean
        required: false
        default: true
    secrets:
      LAZYCAT_TOKEN:
        required: false
      LZC_CLI_TOKEN:
        required: false
      LAZYCAT_USERNAME:
        required: false
      LAZYCAT_PASSWORD:
        required: false
      APPSTORE_URL:
        required: false
      APPSTORE_TOKEN:
        required: false
      APP_ID:
        required: false
      PRIVATE_STORE_GROUP_CODES:
        required: false
      REGISTRY:
        required: false
      REGISTRY_USERNAME:
        required: false
      REGISTRY_PASSWORD:
        required: false
    outputs:
      operation:
        value: ${{ jobs.lazycat.outputs.operation }}
      changed:
        value: ${{ jobs.lazycat.outputs.changed }}
      package-id:
        value: ${{ jobs.lazycat.outputs.package-id }}
      package-file:
        value: ${{ jobs.lazycat.outputs.package-file }}
      manifest-file:
        value: ${{ jobs.lazycat.outputs.manifest-file }}
      version:
        value: ${{ jobs.lazycat.outputs.version }}
      tag:
        value: ${{ jobs.lazycat.outputs.tag }}
      lpk-path:
        value: ${{ jobs.lazycat.outputs.lpk-path }}
      sha256:
        value: ${{ jobs.lazycat.outputs.sha256 }}
      download-url:
        value: ${{ jobs.lazycat.outputs.download-url }}
      image-results:
        value: ${{ jobs.lazycat.outputs.image-results }}
      store-results:
        value: ${{ jobs.lazycat.outputs.store-results }}
      official-store-enabled:
        value: ${{ jobs.lazycat.outputs.official-store-enabled }}
      private-store-enabled:
        value: ${{ jobs.lazycat.outputs.private-store-enabled }}
      update-strategy:
        value: ${{ jobs.lazycat.outputs.update-strategy }}
      channel:
        value: ${{ jobs.lazycat.outputs.channel }}
      result-file:
        value: ${{ jobs.lazycat.outputs.result-file }}
      runner-arch:
        value: ${{ jobs.lazycat.outputs.runner-arch }}
      target-platform:
        value: ${{ jobs.lazycat.outputs.target-platform }}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: lazycat-${{ github.repository }}-${{ inputs.image-id != '' && inputs.image-id || 'all' }}
  cancel-in-progress: false

jobs:
  lazycat:
    runs-on: ${{ inputs.runner }}
    outputs:
      operation: ${{ steps.lazycat.outputs.operation }}
      changed: ${{ steps.lazycat.outputs.changed }}
      package-id: ${{ steps.lazycat.outputs.package-id }}
      package-file: ${{ steps.lazycat.outputs.package-file }}
      manifest-file: ${{ steps.lazycat.outputs.manifest-file }}
      version: ${{ steps.lazycat.outputs.version }}
      tag: ${{ steps.lazycat.outputs.tag }}
      lpk-path: ${{ steps.lazycat.outputs.lpk-path }}
      sha256: ${{ steps.lazycat.outputs.sha256 }}
      download-url: ${{ steps.asset-url.outputs.download-url }}
      image-results: ${{ steps.lazycat.outputs.image-results }}
      store-results: ${{ steps.store-results.outputs.store-results }}
      official-store-enabled: ${{ steps.lazycat.outputs.official-store-enabled }}
      private-store-enabled: ${{ steps.lazycat.outputs.private-store-enabled }}
      update-strategy: ${{ steps.lazycat.outputs.update-strategy }}
      channel: ${{ steps.lazycat.outputs.channel }}
      result-file: ${{ steps.lazycat.outputs.result-file }}
      runner-arch: ${{ steps.lazycat.outputs.runner-arch }}
      target-platform: ${{ steps.lazycat.outputs.target-platform }}
    env:
      REGISTRY: ${{ secrets.REGISTRY }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - name: Checkout application
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Normalize toolchains
        id: toolchains
        shell: bash
        env:
          TOOLCHAINS: ${{ inputs.toolchains }}
          RUST_TOOLCHAIN: ${{ inputs.rust-toolchain }}
          NODE_PACKAGE_MANAGER: ${{ inputs.node-package-manager }}
        run: |
          set -euo pipefail
          value="$(tr '[:upper:]' '[:lower:]' <<<"${TOOLCHAINS}" | tr -d '[:space:]')"
          if [[ "${value}" == "none" || -z "${value}" ]]; then
            value=""
          fi
          IFS=',' read -ra entries <<<"${value}"
          for entry in "${entries[@]}"; do
            case "${entry}" in
              ""|go|node|rust|docker) ;;
              *) echo "unsupported toolchain ${entry}" >&2; exit 1 ;;
            esac
          done
          if [[ ",${value}," == *",rust,"* && -z "${RUST_TOOLCHAIN}" && ! -f rust-toolchain.toml ]]; then
            echo "rust-toolchain input or rust-toolchain.toml is required when rust is selected" >&2
            exit 1
          fi
          case "${NODE_PACKAGE_MANAGER}" in
            npm|pnpm|yarn) ;;
            *) echo "unsupported node package manager ${NODE_PACKAGE_MANAGER}" >&2; exit 1 ;;
          esac
          echo "value=,${value}," >>"${GITHUB_OUTPUT}"
          echo "normalized=${value:-none}" >>"${GITHUB_OUTPUT}"

      - name: Set up Go from input
        if: contains(steps.toolchains.outputs.value, ',go,') && inputs.go-version != ''
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Set up Go from go.mod
        if: contains(steps.toolchains.outputs.value, ',go,') && inputs.go-version == ''
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node from input
        if: contains(steps.toolchains.outputs.value, ',node,') && inputs.node-version != ''
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.node-package-manager == 'npm' && 'npm' || '' }}

      - name: Set up Node from .node-version
        if: contains(steps.toolchains.outputs.value, ',node,') && inputs.node-version == ''
        uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: ${{ inputs.node-package-manager == 'npm' && 'npm' || '' }}

      - name: Enable Node package manager
        if: contains(steps.toolchains.outputs.value, ',node,') && inputs.node-package-manager != 'npm'
        shell: bash
        env:
          NODE_PACKAGE_MANAGER: ${{ inputs.node-package-manager }}
        run: corepack enable "${NODE_PACKAGE_MANAGER}"

      - name: Read Rust toolchain file
        id: rust-toolchain-file
        if: contains(steps.toolchains.outputs.value, ',rust,') && inputs.rust-toolchain == ''
        shell: bash
        run: |
          set -euo pipefail
          channel="$(sed -nE 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' rust-toolchain.toml | head -n 1)"
          if [[ -z "${channel}" ]]; then
            echo "rust-toolchain.toml does not define toolchain.channel" >&2
            exit 1
          fi
          echo "value=${channel}" >>"${GITHUB_OUTPUT}"

      - name: Set up Rust
        if: contains(steps.toolchains.outputs.value, ',rust,')
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ inputs.rust-toolchain != '' && inputs.rust-toolchain || steps.rust-toolchain-file.outputs.value }}
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: Log in to source Registry
        if: env.REGISTRY != '' && env.REGISTRY_USERNAME != '' && env.REGISTRY_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Set up QEMU
        if: contains(steps.toolchains.outputs.value, ',docker,') && inputs.enable-qemu
        uses: docker/setup-qemu-action@v4
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        if: contains(steps.toolchains.outputs.value, ',docker,')
        uses: docker/setup-buildx-action@v3

      - name: Determine source date
        id: source-date
        shell: bash
        run: echo "epoch=$(git show -s --format=%ct HEAD)" >>"${GITHUB_OUTPUT}"

      - name: Run LazyCat automation
        id: lazycat
        uses: ca-x/lazycat-github-action@v1
        env:
          LAZYCAT_TOKEN: ${{ secrets.LAZYCAT_TOKEN }}
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
          LAZYCAT_WORKFLOW_TOOLCHAINS: ${{ steps.toolchains.outputs.normalized }}
          LAZYCAT_WORKFLOW_GO_VERSION: ${{ inputs.go-version }}
          LAZYCAT_WORKFLOW_NODE_VERSION: ${{ inputs.node-version }}
          LAZYCAT_WORKFLOW_RUST_TOOLCHAIN: ${{ inputs.rust-toolchain }}
          SOURCE_DATE_EPOCH: ${{ steps.source-date.outputs.epoch }}
        with:
          operation: ${{ inputs.operation }}
          config: ${{ inputs.config }}
          image-id: ${{ inputs.image-id }}
          changelog: ${{ inputs.changelog }}
          token-file: ${{ inputs.token-file }}
          dry-run: ${{ inputs.dry-run }}

      - name: Prepare release changelog
        id: release-notes
        shell: bash
        env:
          INPUT_CHANGELOG: ${{ inputs.changelog }}
          VERSION: ${{ steps.lazycat.outputs.version }}
        run: |
          set -euo pipefail
          value="${INPUT_CHANGELOG}"
          if [[ -z "${value}" ]]; then
            value="Release ${VERSION}"
          fi
          delimiter="lazycat_changelog"
          while grep -Fxq "${delimiter}" <<<"${value}"; do
            delimiter="${delimiter}_x"
          done
          {
            echo "value<<${delimiter}"
            echo "${value}"
            echo "${delimiter}"
          } >>"${GITHUB_OUTPUT}"

      - name: Upload validation Artifact
        if: steps.lazycat.outputs.lpk-path != ''
        uses: actions/upload-artifact@v7
        with:
          name: lpk-${{ steps.lazycat.outputs.version }}
          path: ${{ steps.lazycat.outputs.lpk-path }}
          if-no-files-found: error

      - name: Create update pull request
        if: steps.lazycat.outputs.operation == 'check' && steps.lazycat.outputs.changed == 'true' && steps.lazycat.outputs.update-strategy == 'pull' && !inputs.dry-run
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: lazycat/update-${{ inputs.image-id != '' && inputs.image-id || 'all' }}
          add-paths: |
            ${{ steps.lazycat.outputs.package-file }}
            ${{ steps.lazycat.outputs.manifest-file }}
          delete-branch: true
          commit-message: "chore: update LazyCat images to ${{ steps.lazycat.outputs.version }}"
          title: "chore: update LazyCat images to ${{ steps.lazycat.outputs.version }}"
          body: |
            Automated LazyCat image update.

            - Version: `${{ steps.lazycat.outputs.version }}`
            - Channel: `${{ steps.lazycat.outputs.channel }}`
            - Target platform: `${{ steps.lazycat.outputs.target-platform }}`
            - SHA256: `${{ steps.lazycat.outputs.sha256 }}`
          labels: dependencies,automated

      - name: Commit direct-publish update
        id: direct-commit
        if: steps.lazycat.outputs.operation == 'check' && steps.lazycat.outputs.changed == 'true' && steps.lazycat.outputs.update-strategy == 'publish' && !inputs.dry-run
        shell: bash
        env:
          VERSION: ${{ steps.lazycat.outputs.version }}
          PACKAGE_FILE: ${{ steps.lazycat.outputs.package-file }}
          MANIFEST_FILE: ${{ steps.lazycat.outputs.manifest-file }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -- "${PACKAGE_FILE}" "${MANIFEST_FILE}"
          git commit -m "chore: update LazyCat application to ${VERSION} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "commit=$(git rev-parse HEAD)" >>"${GITHUB_OUTPUT}"

      - name: Classify Release work
        id: release-state
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ steps.lazycat.outputs.tag }}
          LPK_PATH: ${{ steps.lazycat.outputs.lpk-path }}
          PACKAGE_ID: ${{ steps.lazycat.outputs.package-id }}
          VERSION: ${{ steps.lazycat.outputs.version }}
          VERSIONED_RELEASE_ASSET: ${{ inputs.versioned-release-asset }}
          UPDATE_STRATEGY: ${{ steps.lazycat.outputs.update-strategy }}
          CHANGED: ${{ steps.lazycat.outputs.changed }}
          DRY_RUN: ${{ inputs.dry-run }}
        with:
          script: |
            if (context.ref.startsWith('refs/tags/') || context.eventName === 'release') {
              core.setOutput('should-release', process.env.LPK_PATH ? 'true' : 'false');
              return;
            }
            if (process.env.UPDATE_STRATEGY === 'publish' && process.env.CHANGED === 'true') {
              core.setOutput('should-release', process.env.LPK_PATH ? 'true' : 'false');
              return;
            }
            if (process.env.UPDATE_STRATEGY === 'publish' && process.env.DRY_RUN !== 'true' && context.eventName !== 'pull_request') {
              const packageId = process.env.PACKAGE_ID;
              const version = process.env.VERSION;
              if (!/^[A-Za-z0-9][A-Za-z0-9._-]*$/.test(packageId) || !/^[0-9][0-9A-Za-z.+-]*$/.test(version)) {
                core.setFailed('Package ID or version is unsafe for Release recovery');
                return;
              }
              const expectedAssetName = `${packageId}-v${version}.lpk`;
              try {
                const release = await github.rest.repos.getReleaseByTag({...context.repo, tag: process.env.RELEASE_TAG});
                if (process.env.VERSIONED_RELEASE_ASSET === 'true' && !release.data.assets.some(asset => asset.name === expectedAssetName)) {
                  core.setOutput('should-release', 'true');
                  return;
                }
                core.setOutput('should-release', 'false');
                return;
              } catch (error) {
                if (error.status === 404) {
                  core.setOutput('should-release', 'true');
                  return;
                }
                throw error;
              }
            }
            if (!process.env.LPK_PATH) {
              core.setOutput('should-release', 'false');
              return;
            }
            const repository = await github.rest.repos.get(context.repo);
            const defaultRef = `refs/heads/${repository.data.default_branch}`;
            if (context.eventName !== 'push' || context.ref !== defaultRef) {
              core.setOutput('should-release', 'false');
              return;
            }
            try {
              await github.rest.repos.getReleaseByTag({...context.repo, tag: process.env.RELEASE_TAG});
              core.setOutput('should-release', 'false');
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('should-release', 'true');
                return;
              }
              throw error;
            }

      - name: Build missing Release artifact
        id: recovery-build
        if: steps.release-state.outputs.should-release == 'true' && steps.lazycat.outputs.lpk-path == '' && !inputs.dry-run
        uses: ca-x/lazycat-github-action@v1
        env:
          LAZYCAT_TOKEN: ${{ secrets.LAZYCAT_TOKEN }}
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
          LAZYCAT_WORKFLOW_TOOLCHAINS: ${{ steps.toolchains.outputs.normalized }}
          LAZYCAT_WORKFLOW_GO_VERSION: ${{ inputs.go-version }}
          LAZYCAT_WORKFLOW_NODE_VERSION: ${{ inputs.node-version }}
          LAZYCAT_WORKFLOW_RUST_TOOLCHAIN: ${{ inputs.rust-toolchain }}
          SOURCE_DATE_EPOCH: ${{ steps.source-date.outputs.epoch }}
        with:
          operation: build
          config: ${{ inputs.config }}
          version: ${{ steps.lazycat.outputs.version }}
          changelog: ${{ steps.release-notes.outputs.value }}
          token-file: ${{ inputs.token-file }}
          dry-run: false

      - name: Upload recovered validation Artifact
        if: steps.recovery-build.outputs.lpk-path != ''
        uses: actions/upload-artifact@v7
        with:
          name: lpk-${{ steps.lazycat.outputs.version }}
          path: ${{ steps.recovery-build.outputs.lpk-path }}
          if-no-files-found: error

      - name: Select Release build artifact
        id: release-build
        if: steps.release-state.outputs.should-release == 'true'
        shell: bash
        env:
          PRIMARY_LPK_PATH: ${{ steps.lazycat.outputs.lpk-path }}
          PRIMARY_SHA256: ${{ steps.lazycat.outputs.sha256 }}
          RECOVERY_LPK_PATH: ${{ steps.recovery-build.outputs.lpk-path }}
          RECOVERY_SHA256: ${{ steps.recovery-build.outputs.sha256 }}
        run: |
          set -euo pipefail
          lpk_path="${PRIMARY_LPK_PATH}"
          sha256="${PRIMARY_SHA256}"
          if [[ -z "${lpk_path}" ]]; then
            lpk_path="${RECOVERY_LPK_PATH}"
            sha256="${RECOVERY_SHA256}"
          fi
          if [[ -z "${lpk_path}" || ! -f "${lpk_path}" || ! "${sha256}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Verified Release LPK path and SHA256 are required" >&2
            exit 1
          fi
          delimiter="lazycat_release_build"
          {
            echo "lpk-path<<${delimiter}"
            printf '%s\n' "${lpk_path}"
            echo "${delimiter}"
            echo "sha256=${sha256}"
          } >>"${GITHUB_OUTPUT}"

      - name: Prepare Release asset
        id: release-asset
        if: steps.release-state.outputs.should-release == 'true'
        shell: bash
        env:
          LPK_PATH: ${{ steps.release-build.outputs.lpk-path }}
          PACKAGE_ID: ${{ steps.lazycat.outputs.package-id }}
          VERSION: ${{ steps.lazycat.outputs.version }}
          VERSIONED_RELEASE_ASSET: ${{ inputs.versioned-release-asset }}
        run: |
          set -euo pipefail
          if [[ -z "${LPK_PATH}" || -z "${PACKAGE_ID}" || -z "${VERSION}" ]]; then
            echo "LPK path, package ID, and version are required to prepare a Release asset" >&2
            exit 1
          fi
          if [[ ! "${PACKAGE_ID}" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ || ! "${VERSION}" =~ ^[0-9][0-9A-Za-z.+-]*$ ]]; then
            echo "Package ID or version is unsafe for a Release asset filename" >&2
            exit 1
          fi
          asset_path="${LPK_PATH}"
          if [[ "${VERSIONED_RELEASE_ASSET}" == "true" ]]; then
            asset_dir="$(dirname -- "${LPK_PATH}")"
            asset_path="${asset_dir}/${PACKAGE_ID}-v${VERSION}.lpk"
            cp -- "${LPK_PATH}" "${asset_path}"
          fi
          delimiter="lazycat_release_asset"
          while grep -Fxq "${delimiter}" <<<"${asset_path}"; do
            delimiter="${delimiter}_x"
          done
          {
            echo "lpk-path<<${delimiter}"
            printf '%s\n' "${asset_path}"
            echo "${delimiter}"
          } >>"${GITHUB_OUTPUT}"

      - name: Validate existing Release tag target
        if: steps.release-state.outputs.should-release == 'true' && github.ref_type != 'tag' && github.event_name != 'release'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.lazycat.outputs.tag }}
        run: |
          set -euo pipefail
          if git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            tag_commit="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")"
            head_commit="$(git rev-parse HEAD)"
            if [[ "${tag_commit}" != "${head_commit}" ]]; then
              echo "existing tag ${RELEASE_TAG} points to ${tag_commit}, expected ${head_commit}" >&2
              exit 1
            fi
          fi

      - name: Inspect existing Release Asset
        id: asset-check
        if: steps.release-state.outputs.should-release == 'true'
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ steps.lazycat.outputs.tag }}
          LPK_PATH: ${{ steps.release-asset.outputs.lpk-path }}
          LPK_SHA256: ${{ steps.release-build.outputs.sha256 }}
        with:
          script: |
            const path = require('path');
            const tag = process.env.RELEASE_TAG;
            const assetName = path.basename(process.env.LPK_PATH);
            try {
              const release = await github.rest.repos.getReleaseByTag({...context.repo, tag});
              const asset = release.data.assets.find(item => item.name === assetName);
              if (!asset) {
                core.setOutput('skip-upload', 'false');
                return;
              }
              const expected = `sha256:${process.env.LPK_SHA256}`;
              if (!asset.digest) {
                core.setFailed(`Existing asset ${assetName} has no digest and cannot be safely reused`);
                return;
              }
              if (asset.digest !== expected) {
                core.setFailed(`Existing asset ${assetName} has digest ${asset.digest}, expected ${expected}`);
                return;
              }
              core.setOutput('skip-upload', 'true');
              core.setOutput('download-url', asset.browser_download_url);
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('skip-upload', 'false');
                return;
              }
              throw error;
            }

      - name: Upload GitHub Release Asset
        if: steps.asset-check.outcome == 'success' && steps.asset-check.outputs.skip-upload != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.lazycat.outputs.tag }}
          name: ${{ steps.lazycat.outputs.tag }}
          body: ${{ inputs.changelog }}
          target_commitish: ${{ steps.direct-commit.outputs.commit != '' && steps.direct-commit.outputs.commit || github.sha }}
          files: ${{ steps.release-asset.outputs.lpk-path }}
          fail_on_unmatched_files: true

      - name: Resolve Release Asset URL
        id: asset-url
        if: steps.asset-check.outcome == 'success'
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ steps.lazycat.outputs.tag }}
          LPK_PATH: ${{ steps.release-asset.outputs.lpk-path }}
          LPK_SHA256: ${{ steps.release-build.outputs.sha256 }}
        with:
          script: |
            const path = require('path');
            const release = await github.rest.repos.getReleaseByTag({...context.repo, tag: process.env.RELEASE_TAG});
            const assetName = path.basename(process.env.LPK_PATH);
            const asset = release.data.assets.find(item => item.name === assetName);
            if (!asset) {
              core.setFailed(`Release asset ${assetName} is missing`);
              return;
            }
            const expected = `sha256:${process.env.LPK_SHA256}`;
            if (asset.digest !== expected) {
              core.setFailed(`Release asset ${assetName} digest ${asset.digest} does not match ${expected}`);
              return;
            }
            core.setOutput('download-url', asset.browser_download_url);

      - name: Locate existing Release Asset for store reconciliation
        id: existing-asset
        if: steps.asset-url.outputs.download-url == '' && steps.lazycat.outputs.update-strategy == 'publish' && (steps.lazycat.outputs.official-store-enabled == 'true' || steps.lazycat.outputs.private-store-enabled == 'true') && !inputs.dry-run
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ steps.lazycat.outputs.tag }}
          PACKAGE_ID: ${{ steps.lazycat.outputs.package-id }}
          VERSION: ${{ steps.lazycat.outputs.version }}
        with:
          script: |
            const packageId = process.env.PACKAGE_ID;
            const version = process.env.VERSION;
            if (!/^[A-Za-z0-9][A-Za-z0-9._-]*$/.test(packageId) || !/^[0-9][0-9A-Za-z.+-]*$/.test(version)) {
              core.setFailed('Package ID or version is unsafe for Release reconciliation');
              return;
            }
            const assetName = `${packageId}-v${version}.lpk`;
            try {
              const release = await github.rest.repos.getReleaseByTag({...context.repo, tag: process.env.RELEASE_TAG});
              const asset = release.data.assets.find(item => item.name === assetName);
              if (!asset) return;
              if (!/^sha256:[0-9a-f]{64}$/.test(asset.digest || '')) {
                core.setFailed(`Release asset ${assetName} has no trusted SHA256 digest`);
                return;
              }
              core.setOutput('asset-id', String(asset.id));
              core.setOutput('asset-name', assetName);
              core.setOutput('download-url', asset.browser_download_url);
              core.setOutput('sha256', asset.digest.slice('sha256:'.length));
            } catch (error) {
              if (error.status !== 404) throw error;
            }

      - name: Download existing Release Asset for store reconciliation
        id: recovered-asset
        if: steps.existing-asset.outputs.asset-id != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.lazycat.outputs.tag }}
          ASSET_NAME: ${{ steps.existing-asset.outputs.asset-name }}
          EXPECTED_SHA256: ${{ steps.existing-asset.outputs.sha256 }}
        run: |
          set -euo pipefail
          directory="${GITHUB_WORKSPACE}/.lazycat-action/release-assets"
          mkdir -p -- "${directory}"
          gh release download "${RELEASE_TAG}" --pattern "${ASSET_NAME}" --dir "${directory}" --clobber
          path="${directory}/${ASSET_NAME}"
          actual_sha256="$(sha256sum "${path}" | cut -d' ' -f1)"
          if [[ "${actual_sha256}" != "${EXPECTED_SHA256}" ]]; then
            echo "Downloaded Release asset SHA256 does not match GitHub digest" >&2
            exit 1
          fi
          delimiter="lazycat_recovered_asset"
          {
            echo "lpk-path<<${delimiter}"
            printf '%s\n' "${path}"
            echo "${delimiter}"
          } >>"${GITHUB_OUTPUT}"

      - name: Select verified store artifact
        id: store-artifact
        if: steps.asset-url.outputs.download-url != '' || steps.recovered-asset.outputs.lpk-path != ''
        shell: bash
        env:
          BUILT_LPK_PATH: ${{ steps.release-asset.outputs.lpk-path }}
          BUILT_DOWNLOAD_URL: ${{ steps.asset-url.outputs.download-url }}
          BUILT_SHA256: ${{ steps.release-build.outputs.sha256 }}
          RECOVERED_LPK_PATH: ${{ steps.recovered-asset.outputs.lpk-path }}
          RECOVERED_DOWNLOAD_URL: ${{ steps.existing-asset.outputs.download-url }}
          RECOVERED_SHA256: ${{ steps.existing-asset.outputs.sha256 }}
        run: |
          set -euo pipefail
          lpk_path="${BUILT_LPK_PATH}"
          download_url="${BUILT_DOWNLOAD_URL}"
          sha256="${BUILT_SHA256}"
          if [[ -z "${download_url}" ]]; then
            lpk_path="${RECOVERED_LPK_PATH}"
            download_url="${RECOVERED_DOWNLOAD_URL}"
            sha256="${RECOVERED_SHA256}"
          fi
          if [[ -z "${lpk_path}" || -z "${download_url}" || ! "${sha256}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Verified LPK path, Release URL, and SHA256 are required for store publishing" >&2
            exit 1
          fi
          delimiter="lazycat_store_artifact"
          {
            echo "lpk-path<<${delimiter}"
            printf '%s\n' "${lpk_path}"
            echo "${delimiter}"
            echo "download-url<<${delimiter}"
            printf '%s\n' "${download_url}"
            echo "${delimiter}"
            echo "sha256=${sha256}"
          } >>"${GITHUB_OUTPUT}"

      - name: Publish to MiaoMiao private store
        id: publish-private
        if: steps.lazycat.outputs.update-strategy == 'publish' && steps.lazycat.outputs.private-store-enabled == 'true' && steps.store-artifact.outputs.download-url != '' && !inputs.dry-run
        uses: ca-x/lazycat-github-action@v1
        env:
          APPSTORE_URL: ${{ secrets.APPSTORE_URL }}
          APPSTORE_TOKEN: ${{ secrets.APPSTORE_TOKEN }}
          APP_ID: ${{ secrets.APP_ID }}
          PRIVATE_STORE_GROUP_CODES: ${{ secrets.PRIVATE_STORE_GROUP_CODES }}
        with:
          operation: publish-private
          config: ${{ inputs.config }}
          version: ${{ steps.lazycat.outputs.version }}
          changelog: ${{ steps.release-notes.outputs.value }}
          lpk-path: ${{ steps.store-artifact.outputs.lpk-path }}
          download-url: ${{ steps.store-artifact.outputs.download-url }}
          sha256: ${{ steps.store-artifact.outputs.sha256 }}

      - name: Publish to LazyCat official platform
        id: publish-official
        if: ${{ !cancelled() && steps.lazycat.outputs.update-strategy == 'publish' && steps.lazycat.outputs.official-store-enabled == 'true' && steps.store-artifact.outputs.download-url != '' && !inputs.dry-run }}
        continue-on-error: true
        uses: ca-x/lazycat-github-action@v1
        env:
          LAZYCAT_TOKEN: ${{ secrets.LAZYCAT_TOKEN }}
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
          LAZYCAT_USERNAME: ${{ secrets.LAZYCAT_USERNAME }}
          LAZYCAT_PASSWORD: ${{ secrets.LAZYCAT_PASSWORD }}
        with:
          operation: publish-official
          config: ${{ inputs.config }}
          version: ${{ steps.lazycat.outputs.version }}
          changelog: ${{ steps.release-notes.outputs.value }}
          lpk-path: ${{ steps.store-artifact.outputs.lpk-path }}
          sha256: ${{ steps.store-artifact.outputs.sha256 }}
          token-file: ${{ inputs.token-file }}

      - name: Merge store publishing results
        id: store-results
        if: ${{ always() && !cancelled() }}
        uses: actions/github-script@v8
        env:
          OFFICIAL_OUTCOME: ${{ steps.publish-official.outcome }}
          OFFICIAL_RESULT: ${{ steps.publish-official.outputs.store-results }}
          PRIVATE_RESULT: ${{ steps.publish-private.outputs.store-results }}
        with:
          script: |
            const result = {};
            for (const raw of [process.env.OFFICIAL_RESULT, process.env.PRIVATE_RESULT]) {
              if (!raw) continue;
              const parsed = JSON.parse(raw);
              Object.assign(result, parsed);
            }
            if (process.env.OFFICIAL_OUTCOME === 'failure') {
              result.official = {
                published: false,
                failed: true,
                failureReason: 'official-publish-failed',
              };
              core.warning('Official store publication failed; other configured store results are preserved.');
              await core.summary
                .addHeading('LazyCat official store')
                .addRaw('Official store publication failed. Other configured store results were preserved. Review the official publishing step for the safe error code, HTTP status, and operation.\n')
                .write();
            }
            core.setOutput('store-results', JSON.stringify(result));

      - name: Enforce official-only publication failure
        if: ${{ !cancelled() && steps.publish-official.outcome == 'failure' && steps.lazycat.outputs.private-store-enabled != 'true' }}
        run: |
          echo "Official store publication failed and no private store target is configured." >&2
          exit 1

      - name: Sync tag/release version to default branch
        if: steps.store-artifact.outputs.download-url != '' && steps.lazycat.outputs.changed == 'true' && (github.ref_type == 'tag' || github.event_name == 'release')
        uses: actions/github-script@v8
        env:
          PACKAGE_FILE: ${{ steps.lazycat.outputs.package-file }}
          VERSION: ${{ steps.lazycat.outputs.version }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const absolute = path.resolve(process.env.PACKAGE_FILE);
            const relative = path.relative(process.env.GITHUB_WORKSPACE, absolute).split(path.sep).join('/');
            if (!relative || relative.startsWith('../')) {
              core.setFailed(`package.yml path escapes the workspace: ${absolute}`);
              return;
            }
            const repository = await github.rest.repos.get(context.repo);
            const branch = repository.data.default_branch;
            const current = await github.rest.repos.getContent({...context.repo, path: relative, ref: branch});
            if (Array.isArray(current.data) || current.data.type !== 'file') {
              core.setFailed(`${relative} is not a file on ${branch}`);
              return;
            }
            const content = fs.readFileSync(absolute);
            const existing = Buffer.from(current.data.content, 'base64');
            if (existing.equals(content)) {
              return;
            }
            await github.rest.repos.createOrUpdateFileContents({
              ...context.repo,
              path: relative,
              branch,
              sha: current.data.sha,
              message: `chore: sync package version to ${process.env.VERSION} [skip ci]`,
              content: content.toString('base64'),
            });
