name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: Test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Validate workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 .github/workflows/*.yml examples/*/.github/workflows/*.yml

  shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check shell syntax
        run: bash -n scripts/run-action.sh scripts/run-action_test.sh examples/*/scripts/*.sh

      - name: Run bootstrap tests
        run: bash scripts/run-action_test.sh

      - name: Run ShellCheck
        run: shellcheck scripts/*.sh testdata/*/scripts/*.sh examples/*/scripts/*.sh

  cross-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: Build host binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: go build -o "dist/lazycat-action_linux_${GOARCH}" ./cmd/lazycat-action

  release-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # GoReleaser v2.17.0 requires Go 1.26.4 or newer.
          go-version: "1.26.x"
          cache: true

      - name: Build snapshot release
        run: go run github.com/goreleaser/goreleaser/v2@v2.17.0 release --snapshot --clean --skip=publish,sbom

      - name: Verify release archives
        run: scripts/verify-release-artifacts.sh

  fixture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: Build local Action binary
        env:
          CGO_ENABLED: "0"
        run: go build -o dist/lazycat-action ./cmd/lazycat-action

      - name: Build fixture through composite bootstrap
        env:
          RUNNER_OS: Linux
          RUNNER_ARCH: X64
          LAZYCAT_ACTION_BINARY: ${{ github.workspace }}/dist/lazycat-action
          INPUT_OPERATION: build
          INPUT_CONFIG: .github/lazycat-action.yml
          INPUT_VERSION: v1.2.3
          INPUT_DRY_RUN: "false"
          SOURCE_DATE_EPOCH: "1783641600"
          GITHUB_OUTPUT: /tmp/lazycat-action-output
          GITHUB_STEP_SUMMARY: /tmp/lazycat-action-summary
        run: |
          cp -R testdata/static-app /tmp/lazycat-action-fixture
          cd /tmp/lazycat-action-fixture
          "${GITHUB_WORKSPACE}/scripts/run-action.sh"
          test -f dist/app.lpk
          test -f .lazycat-action/result.json
          grep -q 'target-platform<<lazycat_output_' "${GITHUB_OUTPUT}"
          grep -q 'linux/amd64' "${GITHUB_OUTPUT}"
          grep -q "Action host: \`linux/amd64\`" "${GITHUB_STEP_SUMMARY}"
          test "$(sha256sum dist/app.lpk | cut -d' ' -f1)" = "$(sed -n '/^sha256<</{n;p;}' "${GITHUB_OUTPUT}")"

      - name: Upload fixture LPK
        uses: actions/upload-artifact@v7
        with:
          name: static-fixture-lpk
          path: /tmp/lazycat-action-fixture/dist/app.lpk
          if-no-files-found: error
