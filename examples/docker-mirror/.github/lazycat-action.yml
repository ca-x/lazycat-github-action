version: 1

project:
  root: .
  build_config: lzc-build.yml
  package_file: package.yml
  output: dist/application.lpk

update:
  strategy: pull
  version_source:
    type: image
    image: web

images:
  - id: web
    target: service
    service: web
    source: ghcr.io/acme/example-web
    channel: stable
    delivery:
      mode: mirror
      image_template: ghcr.1ms.run/acme/example-web:{tag}
      require_digest_match: true

stores:
  official:
    enabled: false
  private:
    enabled: true
