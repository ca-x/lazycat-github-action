name: Publish Go Exec LPK
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
  pull-requests: write
jobs:
  lazycat:
    uses: ca-x/lazycat-github-action/.github/workflows/lazycat.yml@v1
    with:
      operation: auto
      config: .github/lazycat-action.yml
      runner: self-hosted-linux-arm64
      toolchains: go
      go-version: 1.25.x
    secrets: inherit
