name: LazyCat LPK
on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  lazycat:
    uses: ca-x/lazycat-github-action/.github/workflows/lazycat.yml@v1
    with:
      operation: auto
      config: .github/lazycat-action.yml
    # Organization Secrets must authorize this repository. A same-name
    # Repository Secret overrides the Organization Secret.
    # Remove mappings for stores that are disabled. Organization Secrets must
    # explicitly authorize this repository.
    secrets:
      LAZYCAT_TOKEN: ${{ secrets.LAZYCAT_TOKEN }}
      APPSTORE_URL: ${{ secrets.APPSTORE_URL }}
      APPSTORE_TOKEN: ${{ secrets.APPSTORE_TOKEN }}
      APP_ID: ${{ secrets.APP_ID }}
      PRIVATE_STORE_GROUP_CODES: ${{ secrets.PRIVATE_STORE_GROUP_CODES }}
