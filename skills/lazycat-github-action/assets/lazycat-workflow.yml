name: LazyCat LPK
on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  lazycat:
    uses: ca-x/lazycat-github-action/.github/workflows/lazycat.yml@v1
    with:
      operation: auto
      config: .github/lazycat-action.yml
      # Produces <package-id>-v<version>.lpk as the verified Release Asset.
      versioned-release-asset: true
    # Organization Secrets must authorize this repository. A same-name
    # Repository Secret overrides the Organization Secret.
    secrets: inherit
